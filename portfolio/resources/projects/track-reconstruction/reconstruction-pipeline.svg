<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 800" width="100%" height="100%">
  <defs>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-weight: 800; font-size: 32px; fill: #0f172a; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2px; rx: 16px; filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.04)); }
      .box-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-weight: 700; font-size: 18px; fill: #1e293b; }
      .box-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-weight: 400; font-size: 14px; fill: #475569; }
      .icon-bg { fill: #f1f5f9; rx: 16px; }
      .arrow-line { stroke: #94a3b8; stroke-width: 4px; stroke-linecap: round; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff" />

  <text x="580" y="85" text-anchor="middle" class="title">RECONSTRUCTION PIPELINE</text>

  <rect x="100" y="160" width="240" height="240" class="box" />
  <rect x="180" y="190" width="80" height="80" class="icon-bg" />
  <g transform="translate(198, 208)">
    <rect x="0" y="0" width="12" height="12" fill="#3b82f6" rx="2" />
    <rect x="16" y="0" width="12" height="12" fill="#3b82f6" rx="2" />
    <rect x="32" y="0" width="12" height="12" fill="#94a3b8" rx="2" />
    <rect x="0" y="16" width="12" height="12" fill="#3b82f6" rx="2" />
    <rect x="16" y="16" width="12" height="12" fill="#94a3b8" rx="2" />
    <rect x="32" y="16" width="12" height="12" fill="#94a3b8" rx="2" />
    <circle cx="35" cy="35" r="6" fill="#64748b" />
    <line x1="18" y1="18" x2="31" y2="31" stroke="#64748b" stroke-width="2" />
  </g>
  <text x="220" y="315" text-anchor="middle" class="box-title">1. Clustering</text>
  <text x="220" y="345" text-anchor="middle" class="box-text">Group raw hits</text>
  <text x="220" y="365" text-anchor="middle" class="box-text">into clusters</text>

  <line x1="355" y1="280" x2="440" y2="280" class="arrow-line" marker-end="url(#arrow)" />

  <rect x="460" y="160" width="240" height="240" class="box" />
  <rect x="540" y="190" width="80" height="80" class="icon-bg" />
  <g transform="translate(545, 215)">
    <path d="M 35 0 L 70 15 L 35 30 L 0 15 Z" fill="#e2e8f0" stroke="#64748b" stroke-width="2" stroke-linejoin="round"/>
    <path d="M 35 15 L 70 30 L 35 45 L 0 30 Z" fill="#e2e8f0" stroke="#64748b" stroke-width="2" stroke-linejoin="round"/>
    <circle cx="35" cy="15" r="4" fill="#0f172a" />
    <circle cx="20" cy="30" r="3" fill="#0f172a" />
    <line x1="35" y1="15" x2="20" y2="30" stroke="#0f172a" stroke-width="1.5" stroke-dasharray="2,2" />
  </g>
  <text x="580" y="315" text-anchor="middle" class="box-title">2. Space Point Formation</text>
  <text x="580" y="345" text-anchor="middle" class="box-text">Define 3D points</text>
  <text x="580" y="365" text-anchor="middle" class="box-text">in space</text>

  <line x1="715" y1="280" x2="800" y2="280" class="arrow-line" marker-end="url(#arrow)" />

  <rect x="820" y="160" width="240" height="240" class="box" />
  <rect x="900" y="190" width="80" height="80" fill="#dcfce7" rx="16" stroke="#22c55e" stroke-width="2" />
  <g transform="translate(910, 205)">
    <circle cx="20" cy="20" r="4.5" fill="#0f172a" />
    <circle cx="40" cy="40" r="4.5" fill="#0f172a" />
    <circle cx="55" cy="15" r="4.5" fill="#0f172a" />
  </g>
  <text x="940" y="315" text-anchor="middle" class="box-title">3. Seeding</text>
  <text x="940" y="345" text-anchor="middle" class="box-text">Find track starting</text>
  <text x="940" y="365" text-anchor="middle" class="box-text">candidates</text>


  <line x1="940" y1="415" x2="940" y2="440" class="arrow-line" marker-end="url(#arrow)" />


  <rect x="820" y="460" width="240" height="240" class="box" />
  <rect x="900" y="490" width="80" height="80" class="icon-bg" />
  <g transform="translate(910, 500)">
    <path d="M 10 50 Q 30 10 60 15" fill="none" stroke="#f59e0b" stroke-width="3" stroke-dasharray="6,4" stroke-linecap="round" />
    <circle cx="35" cy="35" r="10" fill="none" stroke="#d97706" stroke-width="3" />
    <line x1="43" y1="43" x2="55" y2="55" stroke="#d97706" stroke-width="4" stroke-linecap="round" />
  </g>
  <text x="940" y="615" text-anchor="middle" class="box-title">4. Track Finding</text>
  <text x="940" y="645" text-anchor="middle" class="box-text">Traverse layers, match</text>
  <text x="940" y="665" text-anchor="middle" class="box-text">compatible space points</text>

  <line x1="805" y1="580" x2="720" y2="580" class="arrow-line" marker-end="url(#arrow)" />

  <rect x="460" y="460" width="240" height="240" class="box" />
  <rect x="540" y="490" width="80" height="80" class="icon-bg" />
  <g transform="translate(550, 500)">
    <path d="M 10 60 Q 40 20 60 15" fill="none" stroke="#2563eb" stroke-width="4" stroke-linecap="round" />
    <path d="M 50 12 L 63 14 L 60 25 Z" fill="#2563eb" />
  </g>
  <text x="580" y="615" text-anchor="middle" class="box-title">5. Track Fitting</text>
  <text x="580" y="645" text-anchor="middle" class="box-text">Precise global</text>
  <text x="580" y="665" text-anchor="middle" class="box-text">parameter estimation</text>

  <line x1="445" y1="580" x2="360" y2="580" class="arrow-line" marker-end="url(#arrow)" />

  <rect x="100" y="460" width="240" height="240" class="box" />
  <rect x="180" y="490" width="80" height="80" class="icon-bg" />
  <g transform="translate(190, 505)">
    <path d="M 15 10 L 65 10 L 45 35 L 45 55 L 35 50 L 35 35 Z" fill="#e2e8f0" stroke="#7c3aed" stroke-width="3" stroke-linejoin="round" />
    <line x1="25" y1="18" x2="55" y2="18" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" />
  </g>
  <text x="220" y="615" text-anchor="middle" class="box-title">6. Track Filtering</text>
  <text x="220" y="645" text-anchor="middle" class="box-text">Reject fake/poor tracks</text>
  <text x="220" y="665" text-anchor="middle" class="box-text">using quality criteria</text>

</svg>
