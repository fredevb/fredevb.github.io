<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Fred's Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="icon" href="resources/profile/portrait.webp">
    
    <style>
        /* ==========================================================================
           1. DESIGN TOKENS
           ========================================================================== */
        :root {
            --color-bg: #050505;
            --color-surface: #0f0f0f;
            --color-text: #ffffff;
            --color-text-muted: rgba(255, 255, 255, 0.7);
            --color-text-dim: rgba(255, 255, 255, 0.4);
            --color-accent: #ffffff;
            --color-border: rgba(255, 255, 255, 0.1);
            --color-border-strong: rgba(255, 255, 255, 0.3);
            
            --font-main: 'Inter', sans-serif;
            --font-display: 'Inter', sans-serif;
            
            --space-xs: 0.5rem;
            --space-sm: 1rem;
            --space-md: 2rem;
            --space-lg: 4rem;
            --space-xl: 8rem;
            --side-pad: clamp(1.5rem, 5vw, 6rem);
            
            --ease-dramatic: cubic-bezier(0.19, 1, 0.22, 1);
            --duration-md: 0.4s;
            --duration-lg: 0.8s;
            
            --z-overlay: 1000;
            --z-lightbox: 2000;
        }

        /* ==========================================================================
           2. RESET & BASE
           ========================================================================== */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; background: var(--color-bg); }
        body { 
            margin: 0; font-family: var(--font-main); 
            background: var(--color-bg); color: var(--color-text); 
            -webkit-font-smoothing: antialiased; line-height: 1.5;
        }
        h1, h2, h3, h4, p { margin: 0; }
        button { font-family: inherit; border: none; background: none; cursor: pointer; color: inherit; padding: 0; }
        a { text-decoration: none; color: inherit; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--color-bg); }
        ::-webkit-scrollbar-thumb { background: var(--color-border-strong); border-radius: 3px; }

        /* ==========================================================================
           3. LAYOUT COMPONENTS
           ========================================================================== */
        .l-container { max-width: 1400px; margin: 0 auto; padding: 0 var(--side-pad); }
        
        .l-hero { 
            min-height: 100vh; display: flex; flex-direction: column; justify-content: center; 
            padding-top: var(--space-xl); padding-bottom: var(--space-lg);
        }

        .l-section { padding: var(--space-lg) 0; }

        .l-grid {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 2rem;
        }
        @media (min-width: 768px) { .l-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1200px) { .l-grid { grid-template-columns: repeat(3, 1fr); } }

        /* ==========================================================================
           4. UI COMPONENTS
           ========================================================================== */
        
        /* Hero Component */
        .c-hero__tagline { 
            font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.4em; 
            color: var(--color-text-dim); font-weight: 700; margin-bottom: var(--space-sm); 
        }
        .c-hero__title { 
            font-size: clamp(3rem, 10vw, 7rem); font-weight: 900; letter-spacing: -0.05em; 
            line-height: 0.95; margin-bottom: var(--space-md); 
        }
        .c-hero__layout { display: grid; gap: 2rem; border-top: 1px solid var(--color-border); padding-top: 2rem; }
        @media (min-width: 768px) { .c-hero__layout { grid-template-columns: 1.5fr 1fr; } }
        
        .c-hero__highlight { font-size: 1.2rem; font-weight: 600; color: var(--color-text); margin-bottom: 0.5rem; }
        .c-hero__bio { font-size: 1.1rem; color: var(--color-text-muted); line-height: 1.6; max-width: 40rem; }
        
        .c-hero__details { display: flex; flex-direction: column; gap: 1.5rem; justify-content: space-between; }
        .c-hero__tags { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .c-hero__links { display: flex; flex-wrap: wrap; gap: 1rem; }
        
        .c-tag { font-size: 0.7rem; padding: 0.3rem 0.8rem; border: 1px solid var(--color-border-strong); border-radius: 2rem; color: var(--color-text-muted); }

        /* Badge */
        .c-badge { 
            font-size: 0.6rem; font-weight: 800; letter-spacing: 0.2em; text-transform: uppercase;
            margin-bottom: 0.5rem; display: block;
        }
        .c-badge--featured { color: #d4af37; }
        .c-badge--new { color: #50c878; }

        /* Section Header */
        .c-section-header { 
            display: flex; align-items: flex-end; justify-content: space-between; 
            margin-bottom: var(--space-md); border-bottom: 1px solid var(--color-border);
            padding-bottom: var(--space-sm);
        }
        .c-section-header__title { 
            font-size: clamp(1.5rem, 4vw, 2.5rem); font-weight: 800; letter-spacing: -0.02em; 
        }
        .c-section-header__index { 
            font-size: 0.8rem; font-family: monospace; color: var(--color-text-dim); 
            margin-bottom: 0.4rem;
        }

        /* Project Card */
        .c-card {
            position: relative; aspect-ratio: 4/5; background: var(--color-surface);
            border: 1px solid var(--color-border); overflow: hidden; cursor: pointer;
            transition: transform var(--duration-md) var(--ease-dramatic), border-color var(--duration-md);
        }
        .c-card:hover { transform: translateY(-8px); border-color: var(--color-border-strong); }
        
        .c-card__bg {
            position: absolute; inset: 0; background-size: cover; background-position: center;
            filter: grayscale(100%) brightness(0.4); transition: transform 1s var(--ease-dramatic), filter 0.6s;
            z-index: 0;
        }
        .c-card:hover .c-card__bg { transform: scale(1.05); filter: grayscale(0%) brightness(0.7); }

        .c-card__content {
            position: absolute; inset: 0; padding: 2.5rem; display: flex; flex-direction: column;
            justify-content: flex-start; z-index: 1; background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 60%);
        }
        .c-card__details-wrap { margin-top: auto; }
        .c-card__title { font-size: 1.5rem; font-weight: 800; line-height: 1.1; margin-bottom: 0.75rem; }
        .c-card__teaser { 
            font-size: 0.85rem; color: var(--color-text-muted); line-height: 1.5; 
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
            margin-bottom: 1rem;
        }
        .c-card__tags { display: flex; flex-wrap: nowrap; gap: 0.5rem; overflow: hidden; }
        .c-card__tag { font-size: 0.65rem; padding: 0.2rem 0.5rem; border: 1px solid rgba(255,255,255,0.2); border-radius: 2px; white-space: nowrap; }

        /* Buttons */
        .c-btn {
            display: inline-flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1.5rem;
            border: 1px solid var(--color-border-strong); font-size: 0.85rem; font-weight: 600;
            transition: all var(--duration-md); background: var(--color-bg);
        }
        .c-btn:hover { background: var(--color-text); color: var(--color-bg); }
        .c-btn--icon { padding: 0.8rem; }
        .c-btn svg { width: 1.2rem; height: 1.2rem; }

        /* Overlay System */
        .c-overlay {
            position: fixed; inset: 0; background: var(--color-bg); z-index: var(--z-overlay);
            display: flex; flex-direction: column; transform: translateY(100%);
            transition: transform var(--duration-lg) var(--ease-dramatic); overflow-y: auto;
        }
        .c-overlay--active { transform: translateY(0); }
        
        .c-overlay__bg {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-size: cover; background-position: center;
            opacity: 0.15; filter: grayscale(100%);
            -webkit-mask-image: linear-gradient(to bottom, black 0%, transparent 80%);
            mask-image: linear-gradient(to bottom, black 0%, transparent 80%);
        }
        
        .c-overlay__header {
            position: sticky; top: 0; z-index: 10; padding: 1.5rem var(--side-pad);
            display: flex; align-items: center; justify-content: flex-start;
            pointer-events: none;
        }
        .c-overlay__header > * { pointer-events: auto; }
        
        .c-overlay__content { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; padding: 4rem var(--side-pad) 10rem var(--side-pad); }

        /* STAR Section */
        .c-star { margin-top: 4rem; display: grid; gap: 3rem; counter-reset: star-counter; }
        @media (min-width: 768px) { .c-star { grid-template-columns: repeat(2, 1fr); } }
        
        .c-star-node { position: relative; padding-left: 2rem; border-left: 1px solid var(--color-border); counter-increment: star-counter; }
        .c-star-node__label { 
            font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.3em; 
            color: var(--color-text-dim); margin-bottom: 0.5rem; font-weight: 700;
        }
        .c-star-node__label::before { content: '0' counter(star-counter) ' / '; }
        .c-star-node__text { font-size: 1.1rem; color: var(--color-text-muted); line-height: 1.6; }

        /* Gallery Overlay */
        .c-gallery-overlay {
            position: fixed; inset: 0; background: #000; z-index: var(--z-lightbox);
            display: flex; flex-direction: column; transform: translateY(100%);
            transition: transform var(--duration-lg) var(--ease-dramatic);
        }
        .c-gallery-overlay--active { transform: translateY(0); }
        
        .c-gallery__frame { 
            flex: 1; display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative; cursor: zoom-in;
        }
        .c-gallery__media { max-width: 100%; max-height: 80vh; object-fit: contain; }
        
        .c-gallery__footer {
            padding: 2rem var(--side-pad) 4rem var(--side-pad);
            display: flex; flex-direction: column; align-items: center; gap: 1.5rem;
        }
        .c-gallery__caption { 
            font-size: 1rem; color: var(--color-text-muted); text-align: center; 
            max-width: 40rem; line-height: 1.5;
        }
        .c-gallery__controls { display: flex; align-items: center; gap: 2rem; }
        .c-gallery__counter { font-size: 0.8rem; font-family: monospace; color: var(--color-text-dim); letter-spacing: 0.1em; }

        /* Lightbox */
        .c-lightbox {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: var(--z-lightbox);
            display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.4s;
        }
        .c-lightbox--active { display: flex; opacity: 1; }
        .c-lightbox__close { 
            position: absolute; top: 2rem; left: 2rem; width: 3.5rem; height: 3.5rem;
            border-radius: 50%; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s;
        }
        .c-lightbox__close:hover { background: rgba(255,255,255,0.2); transform: scale(1.1); }
        .c-lightbox__content { width: 90vw; height: 80vh; }

        .u-hidden { display: none !important; }
        .u-fade-in { animation: fadeIn 1s var(--ease-dramatic) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="app">
        <!-- Hero Section -->
        <header class="l-hero l-container">
            <span class="c-hero__tagline">MSc Computer Science @ ETH Zürich</span>
            <h1 class="c-hero__title">Hi, I'm Fred.</h1>
            <div class="c-hero__layout">
                <div class="c-hero__bio-wrap">
                    <p class="c-hero__highlight">Apple Summer Intern · Ex. CERN</p>
                    <p class="c-hero__bio">
                        Designing systems that bridge the gap between High-Performance Computing and Machine Learning.
                    </p>
                </div>
                <div class="c-hero__details">
                    <div class="c-hero__tags">
                        <span class="c-tag">HPC</span>
                        <span class="c-tag">Distributed Systems</span>
                        <span class="c-tag">C/C++</span>
                        <span class="c-tag">Deep Learning</span>
                        <span class="c-tag">PyTorch</span>
                    </div>
                    <div class="c-hero__links">
                        <a href="mailto:fred@example.com" class="c-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>Email</a>
                        <a href="https://linkedin.com" target="_blank" class="c-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>LinkedIn</a>
                        <a href="https://github.com" target="_blank" class="c-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>GitHub</a>
                    </div>
                </div>
            </div>
        </header>

        <!-- Project Sections (Dynamically filled by JS) -->
        <main class="l-container" id="project-sections"></main>

        <!-- Project Overlay -->
        <div class="c-overlay js-overlay">
            <div class="c-overlay__bg js-overlay-bg"></div>
            <div class="c-overlay__header">
                <button class="c-btn js-overlay-close">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    Close
                </button>
            </div>
            
            <div class="c-overlay__content">
                <h1 class="c-hero__title js-title" style="font-size: clamp(2.5rem, 6vw, 4.5rem);"></h1>
                <p class="c-hero__bio js-teaser" style="font-size: 1.1rem; max-width: 40rem;"></p>
                
                <div class="js-resources-section u-hidden" style="margin-top: 1.5rem; margin-bottom: 3rem;">
                    <div class="c-hero__links js-resources"></div>
                </div>
                
                <div class="c-star">
                    <div class="c-star-node">
                        <div class="c-star-node__label">Context</div>
                        <p class="c-star-node__text js-s"></p>
                    </div>
                    <div class="c-star-node">
                        <div class="c-star-node__label">Objective</div>
                        <p class="c-star-node__text js-t"></p>
                    </div>
                    <div class="c-star-node">
                        <div class="c-star-node__label">Approach</div>
                        <p class="c-star-node__text js-a"></p>
                    </div>
                    <div class="c-star-node">
                        <div class="c-star-node__label">Result</div>
                        <p class="c-star-node__text js-r"></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Gallery Overlay -->
        <div class="c-gallery-overlay js-gallery-overlay">
            <div class="c-overlay__header">
                <button class="c-btn js-gallery-close">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    Close
                </button>
            </div>
            <div class="c-gallery__frame js-gallery-frame">
                <div class="js-gallery-media"></div>
            </div>
            <div class="c-gallery__footer">
                <div class="c-gallery__caption js-gallery-caption"></div>
                <div class="c-gallery__controls">
                    <button class="c-btn c-btn--icon js-gallery-prev"></button>
                    <span class="c-gallery__counter js-gallery-counter"></span>
                    <button class="c-btn c-btn--icon js-gallery-next"></button>
                </div>
            </div>
        </div>

        <!-- Lightbox -->
        <div class="c-lightbox js-lightbox">
            <div class="c-overlay__header" style="position: absolute; top: 0; left: 0; right: 0; width: 100%;">
                <button class="c-btn js-lightbox-close">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    Close
                </button>
            </div>
            <div class="c-lightbox__content js-lightbox-content"></div>
        </div>
    </div>

    <script>
        const ICONS = {
            LINK: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>`,
            FILE: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path><polyline points="13 2 13 9 20 9"></polyline></svg>`,
            GALLERY: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>`,
            CHEV_LEFT: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>`,
            CHEV_RIGHT: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>`,
            CLOSE: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`,
            MAIL: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>`,
            LINKEDIN: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>`,
            GITHUB: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>`
        };

        const EVENTS = {
            PROJECT_SELECTED: 'PROJECT_SELECTED',
            OPEN_GALLERY: 'OPEN_GALLERY',
            OPEN_LIGHTBOX: 'OPEN_LIGHTBOX'
        };

        class EventBus {
            constructor() { this.listeners = {}; }
            on(evt, callback) { (this.listeners[evt] = this.listeners[evt] || []).push(callback); }
            emit(evt, data) { (this.listeners[evt] || []).forEach(cb => cb(data)); }
        }

        class ProjectStore {
            constructor(data) {
                this.projects = data.projects;
                this.sections = data.sections;
            }
            byId(id) { return this.projects.find(p => p.id === id); }
        }

        class ProjectListController {
            constructor(bus, store) {
                this.bus = bus;
                this.store = store;
                this.container = document.getElementById('project-sections');
                this.render();
            }

            render() {
                this.container.innerHTML = this.store.sections.map((section, idx) => `
                    <section class="l-section">
                        <header class="c-section-header">
                            <h2 class="c-section-header__title">${section.title}</h2>
                            <span class="c-section-header__index">0${idx + 1}</span>
                        </header>
                        <div class="l-grid">
                            ${section.projects.map(p => this.renderCard(p)).join('')}
                        </div>
                    </section>
                `).join('');

                this.container.querySelectorAll('.c-card').forEach(card => {
                    card.addEventListener('click', () => {
                        this.bus.emit(EVENTS.PROJECT_SELECTED, this.store.byId(card.dataset.id));
                    });
                });
            }

            renderCard(p) {
                const bg = p.resources.find(r => r.type === 'background')?.uri || '';
                let badge = '';
                if (p.featured) badge = `<span class="c-badge c-badge--featured">Featured</span>`;
                else if (p.is_new) badge = `<span class="c-badge c-badge--new">New</span>`;

                return `
                    <article class="c-card" data-id="${p.id}">
                        ${bg ? `<div class="c-card__bg" style="background-image: url('${bg}')"></div>` : ''}
                        <div class="c-card__content">
                            ${badge}
                            <div class="c-card__details-wrap">
                                <h3 class="c-card__title">${p.title}</h3>
                                <p class="c-card__teaser">${p.content.teaser}</p>
                                <div class="c-card__tags">
                                    ${p.tags.slice(0, 3).map(t => `<span class="c-card__tag">${t}</span>`).join('')}
                                </div>

        class DetailController {
            constructor(bus) {
                this.bus = bus;
                this.overlay = document.querySelector('.js-overlay');
                this.overlayBg = document.querySelector('.js-overlay-bg');
                this.closeBtn = document.querySelector('.js-overlay-close');
                this.els = {
                    title: document.querySelector('.js-title'),
                    teaser: document.querySelector('.js-teaser'),
                    s: document.querySelector('.js-s'), t: document.querySelector('.js-t'),
                    a: document.querySelector('.js-a'), r: document.querySelector('.js-r'),
                    resources: document.querySelector('.js-resources'),
                    resSection: document.querySelector('.js-resources-section')
                };

                this.closeBtn.addEventListener('click', () => this.close());
                this.bus.on(EVENTS.PROJECT_SELECTED, (p) => this.open(p));
                
                // Close on ESC
                window.addEventListener('keydown', (e) => { if (e.key === 'Escape') this.close(); });
            }

            open(p) {
                const bgRes = p.resources.find(r => r.type === 'background');
                if (bgRes) { this.overlayBg.style.backgroundImage = `url('${bgRes.uri}')`; }
                else { this.overlayBg.style.backgroundImage = 'none'; }

                this.els.title.textContent = p.title;
                this.els.teaser.textContent = p.content.teaser;
                ['s', 't', 'a', 'r'].forEach(k => {
                    const keyMap = {s: 'situation', t: 'task', a: 'action', r: 'result'};
                    this.els[k].textContent = p.content.star[keyMap[k]];
                });

                const links = p.resources.filter(r => !['gallery', 'background'].includes(r.type));
                const galleryImages = p.resources.filter(r => r.type === 'gallery');
                
                let resourcesHtml = links.map(r => `
                    <a href="${r.uri}" target="_blank" class="c-btn">
                        ${r.type === 'link' ? ICONS.LINK : ICONS.FILE} ${r.name}
                    </a>
                `).join('');

                if (galleryImages.length > 0) {
                    resourcesHtml = `
                        <button class="c-btn js-trigger-gallery">
                            ${ICONS.GALLERY} View Gallery
                        </button>
                    ` + resourcesHtml;
                }

                this.els.resources.innerHTML = resourcesHtml;
                this.els.resSection.classList.toggle('u-hidden', links.length === 0 && galleryImages.length === 0);

                const galleryBtn = this.els.resources.querySelector('.js-trigger-gallery');
                if (galleryBtn) {
                    galleryBtn.addEventListener('click', () => this.bus.emit(EVENTS.OPEN_GALLERY, p));
                }

                this.overlay.classList.add('c-overlay--active');
                document.body.style.overflow = 'hidden';
                this.overlay.scrollTo(0, 0);
            }

            close() {
                this.overlay.classList.remove('c-overlay--active');
                document.body.style.overflow = '';
            }
        }

        class GalleryController {
            constructor(bus) {
                this.bus = bus;
                this.overlay = document.querySelector('.js-gallery-overlay');
                this.frame = document.querySelector('.js-gallery-frame');
                this.media = document.querySelector('.js-gallery-media');
                this.caption = document.querySelector('.js-gallery-caption');
                this.counter = document.querySelector('.js-gallery-counter');
                this.closeBtn = document.querySelector('.js-gallery-close');
                this.images = []; this.idx = 0; this.project = null;

                const prevBtn = document.querySelector('.js-gallery-prev');
                const nextBtn = document.querySelector('.js-gallery-next');
                prevBtn.innerHTML = ICONS.CHEV_LEFT;
                nextBtn.innerHTML = ICONS.CHEV_RIGHT;

                prevBtn.addEventListener('click', () => this.navigate(-1));
                nextBtn.addEventListener('click', () => this.navigate(1));
                this.closeBtn.addEventListener('click', () => this.close());
                this.frame.addEventListener('click', () => this.bus.emit(EVENTS.OPEN_LIGHTBOX, { images: this.images, idx: this.idx }));
                this.bus.on(EVENTS.OPEN_GALLERY, (p) => this.load(p));

                window.addEventListener('keydown', (e) => {
                    if (this.overlay.classList.contains('c-gallery-overlay--active')) {
                        if (e.key === 'Escape') this.close();
                        if (e.key === 'ArrowLeft') this.navigate(-1);
                        if (e.key === 'ArrowRight') this.navigate(1);
                    }
                });
            }

            load(p) {
                this.project = p;
                this.images = p.resources.filter(r => r.type === 'gallery').map(r => r.uri);
                this.idx = 0;
                this.overlay.classList.add('c-gallery-overlay--active');
                this.render();
            }

            navigate(dir) { 
                if (!this.images.length) return; 
                this.idx = (this.idx + dir + this.images.length) % this.images.length; 
                this.render(); 
            }

            render() {
                const uri = this.images[this.idx];
                this.media.innerHTML = `<div class="u-fade-in" style="display:flex; align-items:center; justify-content:center; height:100%"></div>`;
                this.injectMedia(this.media.firstElementChild, uri);
                const res = this.project.resources.find(r => r.uri === uri);
                this.caption.textContent = res?.caption || "";
                
                // Update counter
                const cur = (this.idx + 1).toString().padStart(2, '0');
                const tot = this.images.length.toString().padStart(2, '0');
                this.counter.textContent = `${cur} / ${tot}`;
            }

            injectMedia(el, uri) {
                const isVideo = uri.match(/\.(mp4|webm)$/i);
                if (isVideo) {
                    el.innerHTML = `<video class="c-gallery__media" src="${uri}" autoplay muted loop playsinline></video>`;
                } else {
                    el.innerHTML = `<img class="c-gallery__media" src="${uri}" alt="Gallery Image">`;
                }
            }

            close() {
                this.overlay.classList.remove('c-gallery-overlay--active');
            }
        }

        class LightboxController {
            constructor(bus) {
                this.bus = bus;
                this.el = document.querySelector('.js-lightbox');
                this.content = document.querySelector('.js-lightbox-content');
                this.images = []; this.idx = 0;

                const closeBtn = document.querySelector('.js-lightbox-close');
                closeBtn.addEventListener('click', () => this.close());
                
                this.bus.on(EVENTS.OPEN_LIGHTBOX, (data) => {
                    this.images = data.images; this.idx = data.idx;
                    this.open();
                });
            }

            open() {
                this.render();
                this.el.style.display = 'flex'; void this.el.offsetWidth;
                this.el.classList.add('c-lightbox--active');
            }

            render() {
                const uri = this.images[this.idx];
                const isVideo = uri.match(/\.(mp4|webm)$/i);
                if (isVideo) {
                    this.content.innerHTML = `<video class="c-gallery__media" src="${uri}" autoplay muted loop playsinline></video>`;
                } else {
                    this.content.innerHTML = `<img class="c-gallery__media" src="${uri}" alt="Lightbox Image">`;
                }
            }

            close() { 
                this.el.classList.remove('c-lightbox--active'); 
                setTimeout(() => { this.el.style.display = 'none'; }, 400); 
            }
        }
